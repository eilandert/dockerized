# =====================================================================
#  ViMbAdmin  --  hardened deployment
# =====================================================================
#  - read-only root filesystem; only the named volumes + tmpfs are writable
#  - all Linux capabilities dropped except the few FPM/Angie need
#  - no privilege escalation
#  Change EVERY password before deploying. Front with TLS in production.
# =====================================================================

services:
  db:
    image: docker.io/eilandert/mariadb:debian
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: vimbadmin
      MARIADB_USER: vimbadmin
      MARIADB_PASSWORD: change-me
      MARIADB_ROOT_PASSWORD: change-me-too
    volumes:
      - db:/var/lib/mysql
    networks: [vimb]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 256
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  vimbadmin:
    image: docker.io/eilandert/vimbadmin:debian
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: Europe/Amsterdam
    # Run unprivileged (matches USER phpfpm:www-data in the Dockerfile). With
    # cap_drop: [ALL] the container CANNOT chown, so every writable mount must
    # already be owned by this uid:gid. Named volumes (below) inherit the
    # image dir's phpfpm:www-data owner automatically on first mount; for
    # tmpfs or host bind mounts you must set the owner yourself (see tmpfs ex).
    user: "phpfpm:www-data"
    ports:
      - "8080:8080"        # terminate TLS upstream in production
    networks: [vimb]

    # ---- hardening --------------------------------------------------
    read_only: true        # rootfs is immutable; writes go to the volumes below
    # NOTE: production (mailscreen) uses bind mounts instead of named volumes
    # for the writable runtime paths so /run, /tmp and logs survive restarts
    # and are inspectable from the host (pre-chown them phpfpm:www-data). For a
    # stricter, disk-less runtime, swap /run + /tmp to tmpfs instead:
    #   tmpfs:
    #     - /run:uid=997,gid=33,mode=0770   # phpfpm:www-data
    #     - /tmp:uid=997,gid=33,mode=0770
    volumes:
      - conf:/opt/vimbadmin/application/configs   # securitysalt + ini (persist)
      - var:/opt/vimbadmin/var                    # SP ruleset, cache, logs, bruteforce, session
      - run:/run                                  # angie.pid + FPM socket dir
      - tmp:/tmp                                  # angie temp dirs (client/fastcgi/proxy/...)
      - phplog:/var/log/php-fpm                   # FPM master log
    security_opt:
      - no-new-privileges:true
      - apparmor=docker-default
    # Fully unprivileged: PID1 is non-root, angie binds :8080 (no low-port
    # bind), no runtime setuid/chown -> ZERO capabilities required.
    cap_drop: [ALL]
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 128

networks:
  vimb:

volumes:
  db:
  conf:
  var:
  run:
  tmp:
  phplog:
