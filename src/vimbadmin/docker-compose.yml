# =====================================================================
#  ViMbAdmin  --  hardened deployment
# =====================================================================
#  - read-only root filesystem; only the named volumes + tmpfs are writable
#  - all Linux capabilities dropped except the few FPM/Angie need
#  - no privilege escalation
#  Change EVERY password before deploying. Front with TLS in production.
# =====================================================================

services:
  db:
    image: docker.io/eilandert/mariadb:debian
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: vimbadmin
      MARIADB_USER: vimbadmin
      MARIADB_PASSWORD: change-me
      MARIADB_ROOT_PASSWORD: change-me-too
    volumes:
      - db:/var/lib/mysql
    networks: [vimb]
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE]
    deploy:
      resources:
        limits:
          memory: 512M
          pids: 256
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  vimbadmin:
    image: docker.io/eilandert/vimbadmin:debian
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: Europe/Amsterdam
    ports:
      - "8080:80"          # terminate TLS upstream in production
    networks: [vimb]

    # ---- hardening --------------------------------------------------
    read_only: true        # rootfs is immutable; writes go to tmpfs/volumes
    tmpfs:
      - /run:mode=0755
      - /tmp:mode=1777
      - /var/log/php-fpm:mode=0770   # bootstrap chowns to phpfpm:www-data
    volumes:
      - conf:/opt/vimbadmin/application/configs   # securitysalt + ini (persist)
      - var:/opt/vimbadmin/var                    # SP ruleset, cache, logs, bruteforce
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    # CHOWN/SETUID/SETGID: drop to phpfpm + www-data; NET_BIND_SERVICE: bind :80;
    # DAC_OVERRIDE/FOWNER: prep volume perms on first run.
    cap_add: [CHOWN, SETUID, SETGID, NET_BIND_SERVICE, DAC_OVERRIDE, FOWNER]
    deploy:
      resources:
        limits:
          memory: 256M
          pids: 128

networks:
  vimb:

volumes:
  db:
  conf:
  var:
