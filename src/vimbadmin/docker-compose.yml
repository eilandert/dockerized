services:
  db:
    image: docker.io/eilandert/mariadb:debian
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: vimbadmin
      MARIADB_USER: vimbadmin
      MARIADB_PASSWORD: change-me
      MARIADB_ROOT_PASSWORD: change-me-too
    volumes:
      - db:/var/lib/mysql

  vimbadmin:
    image: docker.io/eilandert/vimbadmin:debian
    restart: unless-stopped
    depends_on: [db]
    environment:
      TZ: Europe/Amsterdam
    ports:
      - "8080:80"      # front with TLS upstream in production
    volumes:
      - conf:/opt/vimbadmin/application/configs
      - var:/opt/vimbadmin/var

volumes:
  db:
  conf:
  var:
