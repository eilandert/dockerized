# =====================================================================
#  Angie  --  complete config for the ViMbAdmin image (angie-minimal)
# =====================================================================
#  Everything Angie needs is in this one file. Serves ViMbAdmin on :8080
#  with a native positive-security gate (only known methods, routes and
#  argument names reach PHP). Front it with TLS upstream, or add a 443
#  server block with your certs.
# =====================================================================

# No `user` directive: the container runs as an unprivileged user
# (compose `user: phpfpm:www-data`) so the master cannot setuid workers --
# they inherit the container user. Dropping this lets us run with
# cap_drop: [ALL] (no SETUID/SETGID/CHOWN needed).
worker_processes     auto;
pcre_jit             on;
pid                  /run/angie.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include             /etc/angie/mime.types;
    default_type        application/octet-stream;

    # Temp paths on tmpfs so the container rootfs can be mounted read-only.
    client_body_temp_path /tmp/angie/client;
    fastcgi_temp_path     /tmp/angie/fastcgi;
    proxy_temp_path       /tmp/angie/proxy;

    # ---- performance ------------------------------------------------
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   30;
    keepalive_requests  200;
    server_tokens       off;
    types_hash_max_size 2048;
    open_file_cache     max=2000 inactive=60s;
    open_file_cache_valid 60s;
    open_file_cache_errors on;

    # ---- logging ----------------------------------------------------
    # Some destructive links carry the per-session CSRF token in the URL path
    # (/.../csrf/<token>); redact it from the access log so the token never lands
    # in container/fleet logs. (Referer leakage is handled by Referrer-Policy;
    # moving the token out of the URL entirely is a larger GET->POST change.)
    map $request_uri $vimb_logged_uri {
        "~^(?<vimb_uri_pre>.*)/csrf/[^/?]+(?<vimb_uri_post>.*)$"  "${vimb_uri_pre}/csrf/REDACTED${vimb_uri_post}";
        default                                                  $request_uri;
    }
    log_format  main  '$remote_addr - $remote_user [$time_local] '
                      '"$request_method $vimb_logged_uri $server_protocol" '
                      '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log  /dev/stdout main;
    error_log   /dev/stderr warn;

    # ---- real client IP behind a TLS-terminating proxy --------------
    # This image listens on :8080 behind your edge proxy. To make REMOTE_ADDR
    # the real client (so the app's brute-force + MCP IP checks are accurate),
    # tell Angie which upstream(s) to trust and which header carries the client.
    # Uncomment + set to YOUR proxy's address(es). Requires the realip module
    # (not in angie-minimal -- if absent, leave this off and rely on the app's
    # trustedproxy.mode=auto in application.ini, which is the default).
    # The outer angie reverse proxy (mailscreen_internal_net) sends X-Real-IP +
    # X-Forwarded-For. Trust the private proxy ranges so limit_req and the app
    # see the REAL client IP, not the single proxy address. realip module is
    # compiled in (verified: angie -V | grep http_realip_module).
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    set_real_ip_from  fc00::/7;

    # ---- brute-force throttle: login POSTs only --------------------
    # Keyed on the REAL client IP (real_ip above). Scoped to the auth
    # controller so normal browsing through index.php is never throttled
    # (that was the reason index.php is deliberately un-limited below).
    limit_req_zone $binary_remote_addr zone=vimb_login:10m rate=12r/m;
    limit_req_status 429;

    # ---- BREACH: no compression of secret-bearing dynamic HTML ------
    gzip                off;

    # =================================================================
    #  POSITIVE-SECURITY classifiers (one cheap pass per request)
    # =================================================================

    # 1) Method allowlist (GET/HEAD/POST only).
    map $request_method $vimb_bad_method {
        default 1;  "GET" 0;  "HEAD" 0;  "POST" 0;
    }

    # 2) Route allowlist: known controllers, optional /action, then
    #    /key/value param pairs (e.g. /domain/admins/did/1). Plus static + ACME.
    map $uri $vimb_bad_route {
        default 1;
        "~^/$"                                              0;
        "~^/index\.php$"                                    0;
        "~^/(?:additionalinfo|admin|alias|archive|auth|domain|index|log|mailbox|maintenance|mcp|queue)(?:/[a-z-]+(?:/[A-Za-z0-9._@%+-]+)*)?/?$" 0;
        "~*\.(?:css|js|png|jpe?g|gif|ico|svg|woff2?|ttf|eot|map)$" 0;
        "~^/\.well-known/"                                  0;
    }

    # 3) Argument-name allowlist (harvested from the app). One unknown key
    #    fails the whole query -> blocked.
    #    Case-insensitive (~*): DataTables 1.9 sends mixed-case names (sEcho,
    #    iDisplayStart, ...) over GET; one lowercase alternation covers every
    #    casing. Keep in lockstep with the CRS plugin (t:lowercase) and the
    #    public template contrib/angie/vimbadmin.conf in the vimbadmin repo.
    map $args $vimb_bad_args {
        default 1;
        ""      0;
        "~*^(?:(?:csrf|csrf_token|code|op|verify|captchaid|captchatext|submit|login|action|aid|did|mid|alid|arid|unset|send|ima|delete_files|purge|confirm|which|debug|verbose|query|username|password|current_password|new_password|confirm_new_password|salt|domain|description|transport|backupmx|active|max_aliases|max_mailboxes|max_quota|quota|local_part|name|email|type|alt_email|welcome_email|cc_welcome_email|requestnewimage|admin|super|goto|address|page|search|id|rememberme|pluginsf_[a-z0-9]+|plugin_[a-z0-9_]+|secho|icolumns|scolumns|idisplaystart|idisplaylength|ssearch|bregex|isortingcols|mdataprop_[0-9]+|ssearch_[0-9]+|bregex_[0-9]+|bsearchable_[0-9]+|isortcol_[0-9]+|ssortdir_[0-9]+|bsortable_[0-9]+|_)(?:=[^&]*)?)(?:&(?:csrf|csrf_token|code|op|verify|captchaid|captchatext|submit|login|action|aid|did|mid|alid|arid|unset|send|ima|delete_files|purge|confirm|which|debug|verbose|query|username|password|current_password|new_password|confirm_new_password|salt|domain|description|transport|backupmx|active|max_aliases|max_mailboxes|max_quota|quota|local_part|name|email|type|alt_email|welcome_email|cc_welcome_email|requestnewimage|admin|super|goto|address|page|search|id|rememberme|pluginsf_[a-z0-9]+|plugin_[a-z0-9_]+|secho|icolumns|scolumns|idisplaystart|idisplaylength|ssearch|bregex|isortingcols|mdataprop_[0-9]+|ssearch_[0-9]+|bregex_[0-9]+|bsearchable_[0-9]+|isortcol_[0-9]+|ssortdir_[0-9]+|bsortable_[0-9]+|_)(?:=[^&]*)?)*$" 0;
    }

    # 4) Scanner / empty user-agent.
    map $http_user_agent $vimb_bad_ua {
        default 0;
        ""      1;
        "~*(?:nikto|sqlmap|nmap|masscan|nessus|acunetix|nuclei|wpscan|dirbuster|gobuster|feroxbuster|zgrab|semrush|ahrefsbot|mj12bot|petalbot)" 1;
    }

    server {
        # High port (>=1024) so the unprivileged container user can bind it
        # without CAP_NET_BIND_SERVICE. Edge proxy targets :8080.
        listen      8080 default_server;
        listen      [::]:8080 default_server;
        server_name _;

        root        /opt/vimbadmin/public;
        index       index.php;

        client_max_body_size 16m;
        client_body_timeout  30s;
        client_header_timeout 15s;

        # ---- security headers ---------------------------------------
        add_header X-Frame-Options            "DENY"                              always;
        add_header X-Content-Type-Options     "nosniff"                           always;
        add_header X-XSS-Protection           "0"                                 always;
        # no-referrer: this panel puts the per-session CSRF token in some links'
        # URLs (purge/delete), so never leak the URL via Referer; the app needs
        # no Referer of its own.
        add_header Referrer-Policy            "no-referrer"                       always;
        add_header Permissions-Policy         "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=(), usb=(), browsing-topics=(), interest-cohort=()" always;
        # Cross-origin isolation for an admin panel that is never embedded /
        # framed / fetched cross-site.
        add_header Cross-Origin-Opener-Policy        "same-origin" always;
        add_header Cross-Origin-Resource-Policy      "same-origin" always;
        add_header X-Permitted-Cross-Domain-Policies "none"        always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; form-action 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;
        # Dynamic responses are per-admin and sensitive: never cache them (the
        # static-asset location re-sets its own long cache). Stops back-button /
        # shared-proxy exposure of admin pages after logout.
        add_header Cache-Control "no-store" always;
        # HSTS: image always sits behind a TLS proxy (mail.myguard.nl). 2 years,
        # subdomains, preload-eligible. The outer proxy terminates TLS but the
        # header must originate here so it survives proxy_pass.
        add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;

        # ---- FastCGI -> php-fpm 8.5 (server scope; inherited by the php
        #      locations below, each just adds its own fastcgi_pass) -----
        include              /etc/angie/fastcgi_params;
        fastcgi_index        index.php;
        fastcgi_param        SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param        APPLICATION_ENV  docker;
        fastcgi_hide_header  X-Powered-By;
        fastcgi_read_timeout 130s;
        fastcgi_buffers      16 16k;
        fastcgi_buffer_size  32k;

        # ---- positive-security gate (cheapest denials first) --------
        if ($vimb_bad_ua)     { return 444; }
        if ($vimb_bad_method) { return 405; }
        location ^~ /.well-known/ { allow all; }
        if ($vimb_bad_route)  { return 404; }
        if ($vimb_bad_args)   { return 403; }

        # ---- deny project internals (defence in depth) --------------
        location ~ /\.(?!well-known) { deny all; }
        location ~* ^/(?:application|library|doctrine2|vendor|bin|var|tests)/ { deny all; }
        location ~* \.(?:ini|dist|vagrant|sh|sql|log|orig|bak|swp|dcm\.xml|md)$ { deny all; }

        # ---- static assets ------------------------------------------
        location ~* \.(?:css|js|png|jpe?g|gif|ico|svg|woff2?|ttf|eot|map)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            try_files $uri =404;
        }

        # ---- MCP adapter: bearer-auth JSON-RPC endpoint -------------
        # PRIMARY network barrier -- only these IPs reach PHP. The app then
        # enforces the bearer token + per-token IP allowlist + scope.
        location = /mcp {
            # This image always sits behind a TLS proxy, so allow loopback +
            # private ranges (the proxy is private) and deny the public net.
            # Real gating is the bearer token + per-token IP allowlist (app) +
            # whatever the edge restricts. Tighten to your proxy's IP if wanted.
            allow 127.0.0.1;
            allow ::1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow fc00::/7;
            deny  all;
            # NB: a location with its own fastcgi_param does NOT inherit the
            # server-scope ones, so re-include them here. Run index.php but keep
            # SCRIPT_NAME=/index.php so ZF1 baseUrl detection leaves
            # REQUEST_URI=/mcp as the path (else it hits the default controller).
            include       /etc/angie/fastcgi_params;
            fastcgi_param APPLICATION_ENV  docker;
            fastcgi_param SCRIPT_FILENAME  $document_root/index.php;
            fastcgi_param SCRIPT_NAME      /index.php;
            fastcgi_hide_header X-Powered-By;
            fastcgi_pass  unix:/run/php/vimbadmin-fpm.sock;
        }

        # ---- auth endpoints: brute-force throttle -------------------
        # Login / forgot-password POSTs only. burst=8 nodelay absorbs a normal
        # human's quick retries; sustained hammering past 12r/m gets 429.
        # Real client IP (real_ip) is the key, so one attacker can't be masked
        # behind the proxy and a legit user behind the same proxy isn't punished.
        location ~* ^/auth/(login|forgot) {
            limit_req zone=vimb_login burst=8 nodelay;
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ---- front controller (index.php) ---------------------------
        # NB: do NOT rate-limit here -- the app funnels EVERY dynamic request
        # through index.php, so a limit_req would throttle normal browsing
        # (and behind a proxy it counts the single proxy IP -> instant 503).
        # Login brute-force is handled in the app (per-IP, see [bruteforce]).
        location = /index.php {
            fastcgi_pass unix:/run/php/vimbadmin-fpm.sock;
        }

        # ---- front controller ---------------------------------------
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
        location ~ \.php$ {
            fastcgi_pass unix:/run/php/vimbadmin-fpm.sock;
        }
    }
}
