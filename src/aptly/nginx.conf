# aptly repo server — single self-contained nginx config.
# Serves the published Debian repo (dists/ + pool/) under /aptly/repo/public on
# :80 with a fancyindex directory listing. All config lives in THIS file; no
# sites-enabled / conf.d fan-out.

user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

# Dynamic modules. Loaded explicitly (not via a modules-enabled/* glob) so the
# config is self-documenting and a missing/extra base-image module can't silently
# change behaviour. All three ship in eilandert/debian-base. fancyindex powers
# the directory listing; brotli/zstd let apt clients fetch pre-compressed indexes.
load_module modules/ngx_http_fancyindex_module.so;
load_module modules/ngx_http_brotli_filter_module.so;
load_module modules/ngx_http_brotli_static_module.so;
load_module modules/ngx_http_zstd_filter_module.so;
load_module modules/ngx_http_zstd_static_module.so;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 0;        # repo is read-only; no uploads over HTTP

    # NOTE: open_file_cache is deliberately OFF. With it on (valid=300s) nginx
    # served a stale file stat after aptly rewrote an index in place, so apt got
    # "File has unexpected size. Mirror sync in progress?". Do not re-add it.

    # gzip for the metadata/text; brotli/zstd serve pre-built .br/.zst if present.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json
               application/javascript application/xml+rss application/rss+xml;

    brotli on;
    brotli_static on;
    brotli_comp_level 5;
    brotli_types text/plain text/css application/json application/javascript text/xml;

    zstd on;
    zstd_static on;
    zstd_types text/plain text/css application/json application/javascript text/xml;

    # Block write/abuse methods at the edge — repo is GET/HEAD only.
    map $request_method $block_method {
        default 0;
        ~^(POST|PUT|DELETE|PATCH|OPTIONS|TRACE|CONNECT)$ 1;
    }

    server {
        listen 80 default_server backlog=2048 reuseport fastopen=256;
        listen [::]:80 default_server backlog=2048 reuseport fastopen=256;

        if ($block_method) { return 405; }

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        root /aptly/repo/public;

        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /pages/header.html;
        fancyindex_footer /pages/footer.html;
        fancyindex_ignore pages;

        # Hide dotfiles (incl. the .stage-* publish dirs); symlinked dists still
        # resolve server-side, only the literal dotpath listing is denied.
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }
    }
}
