# aptly repo server — single self-contained nginx config.
# Serves the published Debian repo (dists/ + pool/) under /aptly/repo/public on
# :80 with a fancyindex directory listing. All config lives in THIS file; no
# sites-enabled / conf.d fan-out.

user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

# Only module we use: fancyindex for the directory listing. Loaded explicitly
# (not via a modules-enabled/* glob) so module loading can't silently change with
# the base image. No brotli/zstd: apt fetches aptly's pre-compressed
# Packages.{gz,bz2,xz} directly and never sends Accept-Encoding: br/zstd, and
# aptly emits no .br/.zst for *_static — they'd be dead config.
load_module modules/ngx_http_fancyindex_module.so;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 0;        # repo is read-only; no uploads over HTTP

    # NOTE: open_file_cache is deliberately OFF. With it on (valid=300s) nginx
    # served a stale file stat after aptly rewrote an index in place, so apt got
    # "File has unexpected size. Mirror sync in progress?". Do not re-add it.

    # gzip the fancyindex HTML listing (the only compressible thing served; apt
    # index/pool files are already compressed). on-the-fly, no module needed.
    gzip on;
    gzip_types text/html text/plain text/css;

    # Block write/abuse methods at the edge — repo is GET/HEAD only.
    map $request_method $block_method {
        default 0;
        ~^(POST|PUT|DELETE|PATCH|OPTIONS|TRACE|CONNECT)$ 1;
    }

    server {
        listen 80 default_server backlog=2048 reuseport fastopen=256;
        listen [::]:80 default_server backlog=2048 reuseport fastopen=256;

        if ($block_method) { return 405; }

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        root /aptly/repo/public;

        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /pages/header.html;
        fancyindex_footer /pages/footer.html;
        fancyindex_ignore pages;

        # Hide dotfiles (incl. the .stage-* publish dirs); symlinked dists still
        # resolve server-side, only the literal dotpath listing is denied.
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }
    }
}
