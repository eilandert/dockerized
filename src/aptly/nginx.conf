user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main buffer=32k flush=5s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 0;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    map $request_method $block_method {
        default 0;
        ~^(POST|PUT|DELETE|PATCH|OPTIONS|TRACE|CONNECT)$ 1;
    }

    server {
        listen 80 default_server backlog=2048 reuseport fastopen=256;
        listen [::]:80 default_server backlog=2048 reuseport fastopen=256;
        server_tokens off;

        if ($block_method) { return 405; }

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        fancyindex on;
        fancyindex_exact_size off;
        fancyindex_header /pages/header.html;
        fancyindex_footer /pages/footer.html;
        fancyindex_ignore pages;

        root /aptly/repo/public;

        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }
    }
}
