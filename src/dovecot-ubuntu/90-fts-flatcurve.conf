mail_plugins {
  fts = yes
  fts_flatcurve = yes
}

fts_autoindex = yes
fts_autoindex_max_recent_msgs = 999
fts_search_add_missing = yes

language_filters = normalizer-icu snowball stopwords

language_tokenizers = generic email-address
language_tokenizer_generic_algorithm = simple

language en {
  default = yes
  filters = lowercase snowball english-possessive stopwords
}

fts flatcurve {
  # substring_search builds Xapian n-gram positional data: large transient RAM
  # + index size during indexing. Can OOM indexer-worker (std::bad_alloc) under
  # a tight container memory limit. Set `no` if IMAP substring SEARCH isn't
  # needed (reindex to shrink the existing index).
  substring_search = yes
}
