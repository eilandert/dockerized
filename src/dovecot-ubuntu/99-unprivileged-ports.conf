# =============================================================================
#  High-port listeners.
#
#  Every listener is moved to a >1024 port so the container does not even need
#  CAP_NET_BIND_SERVICE: the root master still runs (it is required for
#  Dovecot's privilege separation — see the note at the bottom), but it never
#  binds a privileged port. The host-side mapping in docker-compose.yml maps
#  the real public port back down, e.g. "24:10024", so clients still connect
#  to the standard 24/110/143/993/995/4190.
#
#  Seeded into conf.d/ on first run; loaded last so it overrides the packaged
#  10-master.conf listener ports. Mount your own /etc/dovecot to change this.
# =============================================================================

service lmtp {
  inet_listener lmtp {
    port = 10024
  }
}

service imap-login {
  inet_listener imap {
    port = 10143
  }
  inet_listener imaps {
    port = 10993
    ssl = yes
  }
}

service pop3-login {
  inet_listener pop3 {
    port = 10110
  }
  inet_listener pop3s {
    port = 10995
    ssl = yes
  }
}

service managesieve-login {
  inet_listener sieve {
    port = 14190
  }
}

# NOTE: the dovecot/dovenull privilege separation is left at its defaults on
# purpose. The root master drops the internet-facing pre-auth login processes
# to the unprivileged `dovenull` user and the mail processes to `vmail`, so a
# bug in the hostile-input parsers cannot touch mail. Do NOT collapse these to
# a single uid — that throws away Dovecot's strongest mitigation.

# =============================================================================
#  Sieve outbound (redirect / vacation / notify).
#
#  This image has NO local MTA (no nullmailer). Sieve hands outbound messages
#  to an MTA by SMTP via submission_host — point it at the Postfix container.
#  Without this, redirect/vacation/notify have nowhere to send and fail.
#  Uncomment and set to your submission service:
# =============================================================================
#submission_host = postfix:587

# =============================================================================
#  TLS hardening.
#
#  Plaintext (143/110) listeners are kept, but plaintext AUTH is REFUSED until
#  the client upgrades with STARTTLS — credentials never cross the wire in the
#  clear. The implicit-TLS ports (993/995) are unaffected.
#
#  TLS 1.2 is the floor (1.0/1.1 disabled), with a strong forward-secret-only
#  cipher list and server cipher preference. Point ssl_cert/ssl_key at your
#  mounted certificate (this image mounts /etc/letsencrypt read-only).
# =============================================================================

# NB: Dovecot 2.4 directive names (NOT the 2.3 ssl_cert / ssl_key /
# ssl_prefer_server_ciphers spellings). Loaded last, so these win over the
# packaged 10-ssl.conf.

# Refuse cleartext logins until STARTTLS has upgraded the connection.
# (dovecot 2.4 renamed 2.3's `disable_plaintext_auth = yes`; the default is
#  already `no` = secure, but we pin it explicitly.)
auth_allow_cleartext = no

# STARTTLS offered on the plaintext ports; implicit TLS on 993/995.
ssl = yes

# Protocol floor: TLS 1.2+ only.
ssl_min_protocol = TLSv1.2

# Forward-secret AEAD ciphers only; server chooses the order.
# (value is client|server in 2.4 — NOT yes/no. The packaged 10-ssl.conf ships
#  an invalid `= yes` here, which we override to a valid value.)
ssl_server_prefer_ciphers = server
ssl_cipher_list = ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256

# TLS 1.3 cipher suites (AEAD only).
ssl_cipher_suites = TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256

# Key-exchange groups: post-quantum hybrid (FIPS-203 ML-KEM) FIRST, then modern
# classical ECDHE as fallback. X25519MLKEM768 needs OpenSSL >= 3.5 in the base
# image (this image ships it); older clients negotiate X25519 / P-256 instead.
ssl_curve_list = X25519MLKEM768:X25519:P-256:P-384:P-521

# Point these at your mounted cert (2.4 names). Dovecot won't start a TLS
# listener without them; the packaged default points at a snakeoil path that
# does not exist in this image, so you MUST set these to your real cert.
#ssl_server_cert_file = /etc/letsencrypt/live/mail.example.org/fullchain.pem
#ssl_server_key_file  = /etc/letsencrypt/live/mail.example.org/privkey.pem
