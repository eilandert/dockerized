# DCC/Razor/Pyzor reporting on Junk moves, via the rspamd-dcc-razor-pyzor shim.
# Baked into this image (scripts in /usr/lib/dovecot/sieve, bridge in
# /usr/lib/dovecot/sieve-pipe). bootstrap.sh drops this into conf.d on first run.
#
# Point the bridge at the backend + its auth token via a writable env file
# (sieve_extprograms scrubs the environment):
#   printf 'DRP_URL=http://rspamd-drp:8077\nDRP_TOKEN=the-shared-secret\n' > /etc/dovecot/drp.env
# DRP_URL default if absent: http://rspamd-drp:8077. DRP_TOKEN must match the
# shim's SHIM_TOKEN or every report is rejected (401).
#
# dovecot 2.4 config syntax: no `plugin {}` wrapper, `sieve_extensions` is a
# named block, and imapsieve rules use `mailbox <name> { sieve_script {} }`
# (events INTO the mailbox) and `imapsieve_from <name> { sieve_script {} }`
# (events OUT of the mailbox).

# imap_sieve runs Sieve on IMAP mailbox events (the rules below). Load it into
# the imap protocol only.
protocol imap {
  mail_plugins {
    imap_sieve = yes
  }
}

# Pigeonhole plugins: imapsieve (the event hooks) + extprograms (the `pipe`
# command the report scripts use).
sieve_plugins = sieve_imapsieve sieve_extprograms

# Where the pipe bridge scripts live (drp-report).
sieve_pipe_bin_dir = /usr/lib/dovecot/sieve-pipe

# Enable the pipe extension so the report scripts may `require "vnd.dovecot.pipe"`.
sieve_extensions {
  vnd.dovecot.pipe = yes
}

# Moved/copied INTO Junk -> report as SPAM.
mailbox Junk {
  sieve_script report-spam {
    type = before
    cause = copy append
    path = /usr/lib/dovecot/sieve/report-spam.sieve
  }
}

# Moved OUT of Junk (into any other mailbox) -> revoke as HAM.
imapsieve_from Junk {
  sieve_script report-ham {
    type = before
    cause = copy
    path = /usr/lib/dovecot/sieve/report-ham.sieve
  }
}
