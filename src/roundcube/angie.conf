# =============================================================================
# Roundcube — single, self-contained Angie configuration.
#
# Everything (main context, events, http, the vhost, and all hardening rules)
# lives in this one file on purpose: it is the only angie config the container
# loads (bootstrap copies it to /etc/angie/angie.conf and starts
# `angie -c /etc/angie/angie.conf`). No /etc/angie/conf.d, sites-enabled, or
# modules-enabled includes — what you see here is what runs.
#
# The container runs UNPRIVILEGED as the single `roundcube` uid (both the angie
# master and php-fpm); angie listens on :8080 so the container can drop every
# Linux capability (no privileged-port bind). php-fpm is reached over a unix
# socket on the /tmp tmpfs.
# =============================================================================

# The container runs UNPRIVILEGED (compose user: roundcube, cap_drop ALL). A
# non-root master must NOT carry `user`: workers inherit the container identity
# (roundcube); leaving `user` set makes angie try to setuid -> needs CAP_SETUID.
worker_processes     auto;
worker_rlimit_nofile 8192;

pid                  /tmp/run/angie.pid;

# Log to the container's stdout/stderr so `docker logs` works.
error_log            /dev/stderr warn;

events {
    worker_connections 2048;
    multi_accept       on;
}

http {
    include            /etc/angie/mime.types;
    default_type       application/octet-stream;

    charset            utf-8;
    server_tokens      off;
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  30s;
    keepalive_requests 100;
    types_hash_max_size 2048;

    # Roundcube attachment uploads — keep in step with phpfpm post_max_size.
    client_max_body_size 25m;
    client_body_buffer_size 256k;
    client_body_timeout  30s;
    client_header_timeout 15s;
    send_timeout         30s;

    # Writable runtime paths only (rootfs is read-only; /tmp is a 1777 tmpfs).
    # angie-minimal is built --without uwsgi/scgi modules, so only these three
    # temp_path directives exist.
    client_body_temp_path /tmp/angie/client-body;
    proxy_temp_path       /tmp/angie/proxy;
    fastcgi_temp_path     /tmp/angie/fastcgi;

    access_log         /dev/stdout combined;

    # BREACH: Roundcube responses carry CSRF tokens + session-bearing HTML, so
    # do NOT compress dynamic output (a BREACH oracle could recover the token).
    # Static assets are already small/cacheable and not secret-bearing; leaving
    # gzip OFF entirely is the simplest safe choice (matches the vimbadmin image).
    gzip               off;

    # ---- real client IP behind the TLS-terminating edge proxy -----------
    # The container listens on :8080 behind the mailscreen edge proxy, which
    # sends X-Forwarded-For. Without this, REMOTE_ADDR is the proxy IP, so the
    # login brute-force throttle below (and RC's own failed-login tracking) key
    # on a single address and can't tell attacker from legit user. Trust the
    # private proxy ranges only. realip module is compiled into angie-minimal.
    #
    # SECURITY: these trusted ranges are broad, so the container's :8080 MUST NOT
    # be reachable from an untrusted network — anything that can reach :8080 from
    # a private range can forge X-Forwarded-For and spoof the client IP (defeating
    # the login throttle below). The compose example binds the published port to
    # 127.0.0.1; keep this behind your TLS edge proxy.
    real_ip_header     X-Forwarded-For;
    real_ip_recursive  on;
    set_real_ip_from   10.0.0.0/8;
    set_real_ip_from   172.16.0.0/12;
    set_real_ip_from   192.168.0.0/16;
    set_real_ip_from   fc00::/7;

    # ---- scanner / empty user-agent classifier --------------------------
    map $http_user_agent $rc_bad_ua {
        default 0;
        ""      1;
        "~*(?:nikto|sqlmap|nmap|masscan|nessus|acunetix|nuclei|wpscan|dirbuster|gobuster|feroxbuster|zgrab|semrush|ahrefsbot|mj12bot|petalbot)" 1;
    }

    # ---- brute-force throttle: login POSTs only -------------------------
    # RC funnels login through /index.php?_task=login&_action=login (POST). We
    # want limit_req on the login attempt ONLY, never on normal browsing (which
    # all hits index.php). limit_req can't be wrapped in an `if`, so instead the
    # zone key is the REAL client IP for a login POST and EMPTY otherwise -- an
    # empty key is not counted by limit_req. Result: only login POSTs consume
    # the rate budget. Keyed on real_ip so the proxy IP doesn't mask the client.
    map $arg__action $rc_login_key {
        default "";
        "login" $binary_remote_addr;
    }
    limit_req_zone $rc_login_key zone=rc_login:10m rate=12r/m;
    limit_req_status 429;

    # The throttle above keys on the _action QUERY arg, which the normal login
    # form carries in the URL. Roundcube also accepts _action from the POST BODY,
    # so a crafted request could send _action=login in the body and miss that map
    # entirely. Add a second, looser per-IP ceiling on EVERY POST to index.php as
    # a body-bypass backstop: empty key for non-POST (normal GET browsing is never
    # counted), the real client IP for POST. ~2 req/s sustained is well above
    # interactive use but caps credential stuffing. App-layer rcguard (bundled,
    # enable it) + Roundcube's own failed_login counter are the body-aware last
    # line of defence.
    map $request_method $rc_post_key {
        default "";
        POST    $binary_remote_addr;
    }
    limit_req_zone $rc_post_key zone=rc_post:10m rate=120r/m;

    # FastCGI upstream — php-fpm runs as the same `roundcube` user; socket on
    # the /tmp tmpfs (the only place a non-root process can create one here).
    upstream php-fpm {
        server unix:/tmp/run/php-fpm.sock;
    }

    server {
        listen      8080 default_server;
        listen      [::]:8080 default_server;
        server_name _;

        # Hardened docroot: RC 1.6 ships public_html/ containing only index.php
        # plus symlinks to program/, skins/, plugins/. config/, temp/, logs/,
        # SQL/, bin/ and vendor/ live OUTSIDE this root and are unreachable.
        root        /var/www/html/public_html;
        index       index.php;
        autoindex   off;

        # ---- Security response headers ----
        add_header X-Content-Type-Options    "nosniff"           always;
        # NOTE: do NOT add X-Frame-Options here. Roundcube already emits its own
        # `X-Frame-Options: sameorigin` from PHP (rcube_output_html). Adding a
        # second one produces a duplicate header; Firefox (incl. Android) treats a
        # repeated X-Frame-Options as invalid -> DENY, which blocks Roundcube's own
        # same-origin preview iframe ("...forbidden to include ... in another
        # site"). Chrome is lenient and collapses identical values, so desktop
        # worked. Clickjacking protection is covered by CSP frame-ancestors 'self'
        # below, which is the modern equivalent.
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection          "0"                 always;
        add_header Permissions-Policy        "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
        # CSP: Roundcube's Elastic skin + plugins rely heavily on inline
        # <script>/<style> and inline event handlers, so script-src/style-src
        # need 'unsafe-inline' (RC has no nonce support). data:/blob: cover
        # inline images + attachment/print previews. frame-ancestors 'self'
        # blocks cross-origin clickjacking while still allowing Roundcube's own
        # same-origin iframes (Elastic loads the settings/prefs panes and the
        # message preview via ?_framed=1 -- 'none' would break those). This is the
        # sole clickjacking control (no X-Frame-Options -- see note above).
        # No external origins are allowed.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; media-src 'self' blob:; connect-src 'self'; form-action 'self'; frame-ancestors 'self'; base-uri 'self'; object-src 'none'" always;
        # HSTS: image always sits behind a TLS proxy. The header must originate
        # here to survive proxy_pass. 2 years, subdomains, preload-eligible.
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ---- scanner / empty-UA gate (cheapest denial first) ----
        if ($rc_bad_ua) { return 444; }

        # ---- RC 1.7 static asset dispatcher (PATH_INFO) ----
        # MUST come before the static-extension regex below: a request like
        # /static.php/program/js/app.js ends in ".js" and would otherwise be
        # captured by that regex and 404 (no such file on disk). A `^~` prefix
        # match wins over any regex location, so this claims /static.php/* first.
        location ^~ /static.php {
            include            fastcgi_params;
            fastcgi_split_path_info ^(/static\.php)(/.*)$;
            fastcgi_param      SCRIPT_FILENAME $document_root/static.php;
            fastcgi_param      PATH_INFO       $fastcgi_path_info;
            fastcgi_pass       php-fpm;
            fastcgi_read_timeout 120s;
            fastcgi_buffers    16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_hide_header X-Powered-By;
            # Cache-Control via `expires` (NOT add_header): defining ANY add_header
            # in this location would replace — and so drop — every inherited
            # server-level security header (CSP/HSTS/nosniff/…) on static.php
            # responses. `expires` sets Cache-Control: max-age without touching
            # add_header inheritance.
            expires            7d;
        }

        # ---- Static assets: long cache, no access log ----
        location ~* \.(avif|jpg|jpeg|gif|png|webp|svg|woff|woff2|ttf|eot|css|js|ico)$ {
            access_log    off;
            log_not_found off;
            # Cache-Control via `expires` only — an add_header here would replace
            # (and so drop) the inherited server-level security headers, leaving
            # static assets without nosniff/CSP/HSTS. `expires 30d` emits
            # Cache-Control: max-age=2592000.
            expires       30d;
            try_files     $uri =404;
        }

        # ---- ACME http-01 (kept for proxies that pass it through) ----
        location ^~ /.well-known/acme-challenge/ {
            allow all;
            default_type "text/plain";
        }

        # =====================================================================
        # Hard denies — paths nobody needs to reach over HTTP.
        #
        # Derived from a scan of the Roundcube 1.7.0 tree (2026-06-03).
        # In 1.7 the docroot public_html/ holds only index.php, static.php and
        # installer.php — there are NO symlinks to program/, skins/ or plugins/
        # anymore (1.6 symlinked them in). Those source trees, plus config/,
        # temp/, logs/, SQL/, bin/, vendor/, are all physically OUTSIDE the
        # docroot and unreachable. Bundled assets are served by static.php,
        # which has its own ".." / secret-file guards and an extension allow-list.
        #
        # The rules below are therefore mostly belt-and-braces (they also fire
        # if someone re-roots the server or restores the old symlink layout),
        # except the installer block, which IS reachable in 1.7.
        # =====================================================================

        # installer.php ships in public_html in 1.7 and is genuinely reachable.
        # It is removed at build time too, but never let it run if present.
        location = /installer.php { deny all; }
        location ^~ /installer     { deny all; }

        # Out-of-docroot trees (belt-and-braces — also blocked by filesystem).
        location ~ ^/(config|temp|logs|SQL|bin|vendor)(/|$) { deny all; }
        location ~ ^/program/(include|lib|localization|actions|steps)/ { deny all; }

        # Dotfiles and VCS metadata (covers public_html/.htaccess too).
        location ~ /\.(?!well-known/) { deny all; }

        # Source / config / schema / docs that could ride inside any reachable
        # tree. static.php already refuses these, but deny at the edge too.
        location ~* \.(inc|inc\.php|sql|dist|sample|tpl|twig|sh|md|log|bak|old|orig|swp)$ { deny all; }
        location ~* (^|/)(config\.inc\.php|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|Gruntfile\.js|Dockerfile|Makefile|\.env)$ { deny all; }
        location ~* (^|/)(README|INSTALL|LICENSE|CHANGELOG|Changelog|UPGRADING|SECURITY|CONTRIBUTING|AUTHORS|NOTICE)(\.(md|txt))?$ { deny all; }
        location ~* (^|/)meta\.json$ { deny all; }

        # ---- Application routing ----
        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # ---- PHP execution: front controller + static asset server only ----
        # Roundcube dispatches dynamic requests through index.php. Since 1.7 the
        # bundled static assets (css/js/images that live OUTSIDE public_html)
        # are served through public_html/static.php/<path>, using PATH_INFO.
        # We therefore execute ONLY these two scripts and refuse every other
        # .php path — neutralising any dropped/uploaded script in the (symlinked)
        # program/ or plugins/ trees.
        location = /index.php {
            # Brute-force throttle: only login POSTs consume the budget (the
            # zone key is empty for every other request, so they're not counted).
            # burst=8 nodelay absorbs a human's quick retries; sustained
            # hammering past 12r/m gets 429.
            limit_req          zone=rc_login burst=8 nodelay;
            # Body-bypass backstop: caps all POSTs to index.php (login attempts
            # that hide _action in the body still hit this ceiling).
            limit_req          zone=rc_post  burst=20 nodelay;
            include            fastcgi_params;
            fastcgi_param      SCRIPT_FILENAME $document_root/index.php;
            fastcgi_pass       php-fpm;
            fastcgi_index      index.php;
            fastcgi_read_timeout 120s;
            fastcgi_buffers    16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_hide_header X-Powered-By;
        }

        # Any other *.php (e.g. program/steps/*.php reached over HTTP, or a
        # dropped webshell): refuse rather than execute.
        location ~ \.php$ {
            return 404;
        }
    }

    # ---- Loopback-only healthcheck vhost (127.0.0.1:8181) --------------------
    # Never reachable from outside the container — the public :8080 default_server
    # above is the only externally-visible vhost. The docker HEALTHCHECK
    # (healthcheck.sh) and the fpm-watch s6 longrun probe /healthz, /fpm-ping and
    # /fpm-status here.
    server {
        listen      127.0.0.1:8181;
        server_name _;
        access_log  off;

        location = /healthz {
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Real php-fpm readiness: fastcgi_pass to the pool and hit its ping.path
        # (=> "pong"). A live pong proves the master is up and the pool answers —
        # catches a dead master, a stale socket, AND a wedged pool.
        location = /fpm-ping {
            include       fastcgi_params;
            fastcgi_pass  php-fpm;
            fastcgi_param SCRIPT_NAME     /fpm-ping;
            fastcgi_param SCRIPT_FILENAME /fpm-ping;
        }

        # Pool status (pm.status_path). Loopback-only; scraped by fpm-watch.
        location = /fpm-status {
            include       fastcgi_params;
            fastcgi_pass  php-fpm;
            fastcgi_param SCRIPT_NAME     /fpm-status;
            fastcgi_param SCRIPT_FILENAME /fpm-status;
        }

        location / { return 444; }
    }
}
