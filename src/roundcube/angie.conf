# =============================================================================
# Roundcube — single, self-contained Angie configuration.
#
# Everything (main context, events, http, the vhost, and all hardening rules)
# lives in this one file on purpose: it is the only angie config the container
# loads (bootstrap copies it to /etc/angie/angie.conf and starts
# `angie -c /etc/angie/angie.conf`). No /etc/angie/conf.d, sites-enabled, or
# modules-enabled includes — what you see here is what runs.
#
# The httpd runs as the unprivileged `angie` user and listens on :8080 so the
# container can drop every Linux capability (no privileged-port bind).
# php-fpm runs as a *different* user (`roundcube`) over a unix socket; angie
# only needs read access to the application root to serve static assets.
# =============================================================================

# The container entrypoint runs as root, so the angie master can bind the
# privileged port 80 and setuid() its workers down to the `roundcube` user.
user                 roundcube;
worker_processes     auto;
worker_rlimit_nofile 8192;

pid                  /tmp/run/angie.pid;

# Log to the container's stdout/stderr so `docker logs` works.
error_log            /dev/stderr warn;

events {
    worker_connections 2048;
    multi_accept       on;
}

http {
    include            /etc/angie/mime.types;
    default_type       application/octet-stream;

    charset            utf-8;
    server_tokens      off;
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  30s;
    keepalive_requests 100;
    types_hash_max_size 2048;

    # Roundcube attachment uploads — keep in step with phpfpm post_max_size.
    client_max_body_size 25m;
    client_body_buffer_size 256k;
    client_body_timeout  30s;
    client_header_timeout 15s;
    send_timeout         30s;

    # Writable runtime paths only (rootfs is read-only; /tmp is a 1777 tmpfs).
    # angie-minimal is built --without uwsgi/scgi modules, so only these three
    # temp_path directives exist.
    client_body_temp_path /tmp/angie/client-body;
    proxy_temp_path       /tmp/angie/proxy;
    fastcgi_temp_path     /tmp/angie/fastcgi;

    access_log         /dev/stdout combined;

    gzip               on;
    gzip_vary          on;
    gzip_proxied       any;
    gzip_comp_level    5;
    gzip_min_length    256;
    gzip_types         text/plain text/css application/json application/javascript
                       text/javascript application/xml image/svg+xml;

    # FastCGI upstream — php-fpm runs as the same `roundcube` user; socket on
    # the /tmp tmpfs (the only place a non-root process can create one here).
    upstream php-fpm {
        server unix:/tmp/run/php-fpm.sock;
    }

    server {
        listen      80 default_server;
        listen      [::]:80 default_server;
        server_name _;

        # Hardened docroot: RC 1.6 ships public_html/ containing only index.php
        # plus symlinks to program/, skins/, plugins/. config/, temp/, logs/,
        # SQL/, bin/ and vendor/ live OUTSIDE this root and are unreachable.
        root        /var/www/html/public_html;
        index       index.php;
        autoindex   off;

        # ---- Security response headers ----
        add_header X-Content-Type-Options    "nosniff"           always;
        add_header X-Frame-Options           "SAMEORIGIN"        always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header X-XSS-Protection          "1; mode=block"     always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
        # HSTS is set at the TLS-terminating reverse proxy, not here.

        # ---- RC 1.7 static asset dispatcher (PATH_INFO) ----
        # MUST come before the static-extension regex below: a request like
        # /static.php/program/js/app.js ends in ".js" and would otherwise be
        # captured by that regex and 404 (no such file on disk). A `^~` prefix
        # match wins over any regex location, so this claims /static.php/* first.
        location ^~ /static.php {
            include            fastcgi_params;
            fastcgi_split_path_info ^(/static\.php)(/.*)$;
            fastcgi_param      SCRIPT_FILENAME $document_root/static.php;
            fastcgi_param      PATH_INFO       $fastcgi_path_info;
            fastcgi_pass       php-fpm;
            fastcgi_read_timeout 120s;
            fastcgi_buffers    16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_hide_header X-Powered-By;
            expires            7d;
            add_header         Cache-Control "public";
        }

        # ---- Static assets: long cache, no access log ----
        location ~* \.(avif|jpg|jpeg|gif|png|webp|svg|woff|woff2|ttf|eot|css|js|ico)$ {
            access_log    off;
            log_not_found off;
            expires       30d;
            add_header    Cache-Control "public, immutable";
            try_files     $uri =404;
        }

        # ---- ACME http-01 (kept for proxies that pass it through) ----
        location ^~ /.well-known/acme-challenge/ {
            allow all;
            default_type "text/plain";
        }

        # =====================================================================
        # Hard denies — paths nobody needs to reach over HTTP.
        #
        # Derived from a scan of the Roundcube 1.7.0 tree (2026-06-03).
        # In 1.7 the docroot public_html/ holds only index.php, static.php and
        # installer.php — there are NO symlinks to program/, skins/ or plugins/
        # anymore (1.6 symlinked them in). Those source trees, plus config/,
        # temp/, logs/, SQL/, bin/, vendor/, are all physically OUTSIDE the
        # docroot and unreachable. Bundled assets are served by static.php,
        # which has its own ".." / secret-file guards and an extension allow-list.
        #
        # The rules below are therefore mostly belt-and-braces (they also fire
        # if someone re-roots the server or restores the old symlink layout),
        # except the installer block, which IS reachable in 1.7.
        # =====================================================================

        # installer.php ships in public_html in 1.7 and is genuinely reachable.
        # It is removed at build time too, but never let it run if present.
        location = /installer.php { deny all; }
        location ^~ /installer     { deny all; }

        # Out-of-docroot trees (belt-and-braces — also blocked by filesystem).
        location ~ ^/(config|temp|logs|SQL|bin|vendor)(/|$) { deny all; }
        location ~ ^/program/(include|lib|localization|actions|steps)/ { deny all; }

        # Dotfiles and VCS metadata (covers public_html/.htaccess too).
        location ~ /\.(?!well-known/) { deny all; }

        # Source / config / schema / docs that could ride inside any reachable
        # tree. static.php already refuses these, but deny at the edge too.
        location ~* \.(inc|inc\.php|sql|dist|sample|tpl|twig|sh|md|log|bak|old|orig|swp)$ { deny all; }
        location ~* (^|/)(config\.inc\.php|composer\.(json|lock)|package(-lock)?\.json|yarn\.lock|Gruntfile\.js|Dockerfile|Makefile|\.env)$ { deny all; }
        location ~* (^|/)(README|INSTALL|LICENSE|CHANGELOG|Changelog|UPGRADING|SECURITY|CONTRIBUTING|AUTHORS|NOTICE)(\.(md|txt))?$ { deny all; }
        location ~* (^|/)meta\.json$ { deny all; }

        # ---- Application routing ----
        location / {
            try_files $uri $uri/ /index.php$is_args$args;
        }

        # ---- PHP execution: front controller + static asset server only ----
        # Roundcube dispatches dynamic requests through index.php. Since 1.7 the
        # bundled static assets (css/js/images that live OUTSIDE public_html)
        # are served through public_html/static.php/<path>, using PATH_INFO.
        # We therefore execute ONLY these two scripts and refuse every other
        # .php path — neutralising any dropped/uploaded script in the (symlinked)
        # program/ or plugins/ trees.
        location = /index.php {
            include            fastcgi_params;
            fastcgi_param      SCRIPT_FILENAME $document_root/index.php;
            fastcgi_pass       php-fpm;
            fastcgi_index      index.php;
            fastcgi_read_timeout 120s;
            fastcgi_buffers    16 16k;
            fastcgi_buffer_size 32k;
            fastcgi_hide_header X-Powered-By;
        }

        # Any other *.php (e.g. program/steps/*.php reached over HTTP, or a
        # dropped webshell): refuse rather than execute.
        location ~ \.php$ {
            return 404;
        }
    }
}
