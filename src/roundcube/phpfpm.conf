; =============================================================================
; Roundcube php-fpm pool (PHP 8.5) — the sole [www] pool, baked read-only.
;
; The container runs unprivileged (PID1 = roundcube); the FPM master does NOT
; setuid (workers inherit the roundcube identity). Per-deploy tweaks go in
; phpfpm.conf.override (included at end).
; =============================================================================

; ---- Process identity ----
; This is the sole php-fpm pool. The stock www.conf is removed at build time
; (see Dockerfile) so there is exactly one [www] pool.
[www]

; The container runs UNPRIVILEGED (compose user: roundcube, cap_drop ALL). A
; non-root FPM master CANNOT setuid, and php-fpm errors if a pool sets
; user/group while the master isn't root -> comment them out. Workers inherit
; the container's roundcube identity. The listen.* socket-ownership lines stay
; (chown of the socket to our own uid is a no-op, needs no CAP_CHOWN).
;user                 = roundcube
;group                = roundcube
listen               = /tmp/run/php-fpm.sock
listen.owner         = roundcube
listen.group         = roundcube
listen.mode          = 0660

; ---- Process manager (dynamic) ----
; Sized to fit the 512M container memory cap (docker-compose deploy limit).
; Budget within 512M:
;   angie master+workers   ~40M
;   opcache SHM 96 + JIT 32 + interned 8   ~136M  (shared, see below)
;   APCu shm                32M
;   => shared overhead     ~208M  -> ~300M left for PHP workers
;   RC worker ~45M each     -> 6 children fits with headroom.
pm                   = dynamic
pm.max_children      = 6
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests      = 500
pm.process_idle_timeout = 15s
pm.status_path       = /__fpm_status

; Recycle a worker if a single request runs away.
request_terminate_timeout = 300

; Send php worker logs to the container stderr (read-only rootfs friendly).
catch_workers_output = yes
decorate_workers_output = no
php_admin_value[error_log] = /proc/self/fd/2

; Roundcube reads its config from a colon-separated path list. We give it the
; writable mounted dir (holds the generated config.inc.php) FIRST, then the
; baked-in install config dir (holds defaults.inc.php + mimetypes.php, which
; live on the read-only rootfs). RC merges across all paths, so this keeps the
; generated runtime config writable without copying the read-only defaults.
; "config/" is resolved relative to INSTALL_PATH by RC.
; clear_env=no is required so php-fpm actually exports these to the workers.
clear_env = no
env[RCUBE_CONFIG_PATH] = /var/roundcube/config/:config/
env[TZ] = $TZ

; ---- Hardening (php_admin_* = cannot be overridden by ini_set/userland) ----
php_admin_flag[display_errors]            = off
php_admin_flag[log_errors]                = on
php_admin_flag[expose_php]                = off
php_admin_flag[allow_url_fopen]           = off
php_admin_flag[allow_url_include]         = off
php_admin_flag[session.use_strict_mode]   = on
php_admin_flag[session.cookie_httponly]   = on
php_admin_flag[session.cookie_secure]     = on
php_admin_value[session.sid_length]       = 64
php_admin_value[session.cookie_samesite]  = Strict

php_admin_value[memory_limit]             = 256M
php_admin_value[max_execution_time]       = 300
php_admin_value[max_input_vars]           = 5000
php_admin_value[upload_max_filesize]      = 25M
php_admin_value[post_max_size]            = 25M
php_admin_value[date.timezone]            = UTC

; open_basedir confines php to the app + its writable runtime dirs.
php_admin_value[open_basedir] = "/var/www/html:/var/roundcube:/tmp/roundcube-temp:/tmp/run"

; upload_tmp_dir / sys_temp_dir MUST point inside open_basedir, otherwise PHP
; defaults to /tmp (outside the jail) and every attachment upload fails with
; "open_basedir restriction in effect. File(/tmp) is not within the allowed
; path(s)" / "File upload error - unable to create a temporary file".
php_admin_value[upload_tmp_dir]           = /tmp/roundcube-temp
php_admin_value[sys_temp_dir]             = /tmp/roundcube-temp

; Belt-and-braces — Snuffleupagus (roundcube.rules) is the primary control,
; but disable_functions blocks the obvious subprocess + recon surface too.
; NB: do NOT list eval here — RC's template engine relies on it.
php_admin_value[disable_functions] = "exec,passthru,shell_exec,system,proc_open,proc_close,proc_get_status,proc_nice,proc_terminate,popen,pcntl_exec,pcntl_fork,dl,php_uname,phpinfo,show_source,highlight_file,posix_kill,posix_setuid,posix_setgid,posix_setpgid,posix_setsid,posix_setegid,posix_seteuid"

; ---- OPcache (PHP 8.5) ----
; Buffer sizes sized to fit the 512M container cap alongside 6 PHP workers
; (96 + 32 JIT + 8 interned = ~136M shared opcache).
php_admin_value[opcache.enable]               = 1
php_admin_value[opcache.enable_cli]           = 0
php_admin_value[opcache.memory_consumption]   = 96
php_admin_value[opcache.interned_strings_buffer] = 8
php_admin_value[opcache.max_accelerated_files]   = 16000
php_admin_value[opcache.validate_timestamps]  = 1
php_admin_value[opcache.revalidate_freq]      = 60
php_admin_value[opcache.save_comments]        = 1
php_admin_value[opcache.jit]                  = tracing
php_admin_value[opcache.jit_buffer_size]      = 32M
; No opcache file_cache: the only writable fs (/tmp) is mounted noexec, and the
; shared-memory opcache already caches everything for the FPM workers. JIT uses
; anonymous executable memory (not tmpfs), so it is unaffected by noexec.

; ---- APCu (userland cache: RC uses it for IMAP/cache backends if configured)
php_admin_value[apc.enabled]      = 1
php_admin_value[apc.shm_size]     = 32M
php_admin_value[apc.enable_cli]   = 0

; ---- Snuffleupagus rulebook (shipped by php8.5-snuffleupagus) ----
; The strict, source-audited Roundcube rulebook. See README.rules in the
; php-snuffleupagus package for why this is pinned per-pool, not globally.
php_admin_value[sp.configuration_file] = /etc/php/8.5/php-snuffleupagus/roundcube.rules
