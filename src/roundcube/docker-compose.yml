# =============================================================================
# Roundcube deployment.
#
# The container entrypoint runs as root: angie binds :80 and setuids its
# workers to `roundcube`, php-fpm setuids its workers to `roundcube`, and
# bootstrap chowns the mounted config dir to the runtime user. The worker
# processes themselves run unprivileged. Snuffleupagus (strict rulebook) is the
# in-app hardening layer. Terminate TLS at an upstream reverse proxy.
# =============================================================================
services:

  roundcube:
    container_name: roundcube
    image: eilandert/roundcube:latest
    restart: always
    depends_on:
      - mariadb-mail
      - redis-roundcube

    volumes:
      # Writable config dir (generated config.inc.php + override). bootstrap
      # chowns it to the roundcube uid on start, so no host prep is needed.
      - ./roundcube/config:/var/roundcube/config

    ports:
      - "80:80"          # TLS terminated at an upstream proxy

    environment:
      - ROUNDCUBEMAIL_DEFAULT_HOST=ssl://10.0.0.227
      - ROUNDCUBEMAIL_DEFAULT_PORT=993
      - ROUNDCUBEMAIL_SMTP_SERVER=tls://postfix
      - ROUNDCUBEMAIL_SMTP_PORT=587
      # IMAP/SMTP TLS is VERIFIED by default. The reference DEFAULT_HOST above is
      # an internal IP whose cert likely won't match — fix it the secure way,
      # pick ONE:
      #   - point DEFAULT_HOST at a name in the cert's SAN (best), or
      #   - pin your CA:   ROUNDCUBEMAIL_SSL_CA=/etc/ssl/mail-ca.pem
      #                    (mount it:  ./mail-ca.pem:/etc/ssl/mail-ca.pem:ro)
      # Only as a last resort on a trusted LAN, disabling verification (MITM
      # possible) — uncomment:
      #   - ROUNDCUBEMAIL_SSL_VERIFY=0
      - ROUNDCUBEMAIL_DB_TYPE=mysql
      - ROUNDCUBEMAIL_DB_HOST=172.30.0.100
      - ROUNDCUBEMAIL_DB_USER=roundcube
      - ROUNDCUBEMAIL_DB_PASSWORD          # defined in .env
      - ROUNDCUBEMAIL_DB_NAME=roundcube
      - ROUNDCUBEMAIL_PLUGINS=archive,zipdownload,managesieve,newmail_notifier,password,new_user_dialog,contextmenu,persistent_login
      - ROUNDCUBEMAIL_UPLOAD_MAX_FILESIZE=25M
      - TZ=Europe/Amsterdam
      - CLEAN_INACTIVE_USERS_DAYS=365

    ulimits:
      nofile:
        soft: 10240
        hard: 10240

    deploy:
      resources:
        limits:
          memory: 512M
          pids: 256

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
