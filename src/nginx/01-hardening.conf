# 01-hardening.conf — http-context defaults shared across every vhost.
# Loaded automatically from /etc/nginx/conf.d/ (or /etc/angie/conf.d/).
# Numbered "01-" so per-site overrides (cms.conf, custom.conf, …) win on
# duplicate keys.

# ---- Identity / fingerprinting ----
server_tokens         off;                  # hide version in error pages + Server:
more_clear_headers    'Server';             # if mod-headers-more is enabled (silently no-op otherwise)

# ---- Slowloris and resource-exhaustion defenses ----
client_body_timeout       12s;
client_header_timeout     12s;
keepalive_timeout         30s;
send_timeout              12s;
reset_timedout_connection on;

# ---- Buffer / size sane defaults (CMS image bumps client_max_body_size) ----
client_body_buffer_size       128k;
client_header_buffer_size     1k;
large_client_header_buffers   4 8k;
client_max_body_size          16m;

# ---- Hide upstream-leaked headers ----
fastcgi_hide_header   X-Powered-By;
fastcgi_hide_header   X-Generator;
fastcgi_hide_header   X-Drupal-Cache;
fastcgi_hide_header   X-Drupal-Dynamic-Cache;
proxy_hide_header     X-Powered-By;
proxy_hide_header     X-Generator;
proxy_hide_header     X-AspNet-Version;
proxy_hide_header     X-AspNetMvc-Version;

# ---- Sane gzip defaults (CMS image extends the type list) ----
gzip                  on;
gzip_vary             on;
gzip_proxied          any;
gzip_comp_level       5;
gzip_min_length       1024;
gzip_types            text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

# ---- Disable unsafe HTTP methods at the edge ----
# Drop TRACE / TRACK (XST). Allow the rest at the location level if needed.
map $request_method $bad_method {
    default 0;
    TRACE   1;
    TRACK   1;
    DEBUG   1;
}

# ---- Mark exploit-scanner User-Agents (still reachable via 444 if you opt in) ----
map $http_user_agent $is_bad_bot {
    default                       0;
    ~*(?i)(nikto|sqlmap|nmap)     1;
    ~*(?i)masscan                 1;
    ~*(?i)dirbuster               1;
    ~*(?i)wpscan                  1;
    ~*(?i)acunetix                1;
    ~*(?i)nessus                  1;
    ""                            1;       # empty UA — almost always a scanner
}
