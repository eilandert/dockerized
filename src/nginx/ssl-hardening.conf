# ssl-hardening.conf — drop-in for any HTTPS server{} block:
#   include snippets/ssl-hardening.conf;
#
# TLS 1.2 + 1.3 only. Modern, Mozilla-intermediate-ish cipher list.

ssl_protocols                 TLSv1.2 TLSv1.3;

# TLS 1.3 ciphers are non-negotiable (the protocol picks). TLS 1.2 ciphers
# listed below in preference order. ECDHE-only — no plain RSA key exchange.
ssl_ciphers                   "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384";
ssl_prefer_server_ciphers     off;

# ECDH curves (modern only).
ssl_ecdh_curve                X25519:secp384r1:prime256v1;

# Session cache — shared across workers, no tickets (perfect forward secrecy).
ssl_session_cache             shared:SSL:50m;
ssl_session_timeout           1d;
ssl_session_tickets           off;

# OCSP stapling — set ssl_trusted_certificate to your fullchain in the
# per-site config if you want the stapled response to validate.
ssl_stapling                  on;
ssl_stapling_verify           on;
resolver                      1.1.1.1 9.9.9.9 valid=300s ipv6=off;
resolver_timeout              5s;

# Early data (TLS 1.3 0-RTT). OFF by default — replay-attack surface for
# anything non-idempotent. Turn ON in per-site config if you understand it.
ssl_early_data                off;

# Don't reveal SSL handshake errors to clients.
ssl_reject_handshake          off;
