# 02-rate-limits.conf — http-context rate-limit and connection-limit zones.
# Reference these from snippets (snippets/wordpress.conf already uses
# `cms_login`) or per-server limit_req / limit_conn directives.
#
# Defaults are conservative. Tune per workload.

# Per-IP connection cap (default applied below).
limit_conn_zone $binary_remote_addr  zone=conn_per_ip:10m;

# Login / xmlrpc rate-limit — 5 requests/minute, burst 2.
limit_req_zone  $binary_remote_addr  zone=cms_login:10m  rate=5r/m;

# Generic API / REST rate-limit — 100 req/min per IP.
limit_req_zone  $binary_remote_addr  zone=api:10m  rate=100r/m;

# Search / admin endpoints — 30 req/min per IP.
limit_req_zone  $binary_remote_addr  zone=admin:10m  rate=30r/m;

# Default per-IP connection ceiling — 50 simultaneous connections.
limit_conn      conn_per_ip 50;

# When a limit fires, return 429 (not the default 503).
limit_req_status 429;
limit_conn_status 429;
