# Drupal 9/10/11 location block — include this inside a `server { }`:
#   include snippets/drupal.conf;
#
# Doc root must point at the `web/` directory of a Composer-style project,
# or the project root for legacy installs.

location = /favicon.ico { log_not_found off; access_log off; }
location = /robots.txt  { allow all; log_not_found off; access_log off; }

# Block direct access to private/system paths.
location ~ \..*/.*\.php$       { return 403; }
location ~ ^/sites/.*/private/ { return 403; }
location ~ ^/sites/[^/]+/files/.*\.php$ { deny all; }
location ~* ^/(?:autoload\.php|composer\.(?:json|lock)|web\.config|sites/[^/]+/settings.*\.php|sites/example\.sites\.php|sites/example\.settings\.local\.php)$ { return 403; }
location ~ /\.(?!well-known) { deny all; }

# Allow files to be served by Drupal's friendly URLs.
location / {
    try_files $uri /index.php?$query_string;
}

# Files / image styles handled by Drupal.
location @rewrite {
    rewrite ^/(.*)$ /index.php?q=$1;
}
location ~ ^/sites/.*/files/styles/ {
    try_files $uri @rewrite;
}

# Only allow these PHP scripts to be executed.
location ~ '\.php$|^/update.php' {
    fastcgi_split_path_info ^(.+?\.php)(|/.*)$;
    try_files $fastcgi_script_name =404;
    include  snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.5-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param PATH_INFO       $fastcgi_path_info;
    fastcgi_intercept_errors on;
}

# Static asset caching.
location ~* \.(?:css|js|svg|gif|jpe?g|png|webp|avif|ico|woff2?|ttf|otf|eot)$ {
    expires    30d;
    access_log off;
    add_header Cache-Control "public, immutable";
    try_files  $uri =404;
}
