# Angie defaults tuned for CMS workloads.
# Dropped at /etc/angie.orig/conf.d/cms.conf → copied into /etc/angie/conf.d
# by the angie bootstrap on first start.

# Generous body size so CMS media uploads work out of the box.
client_max_body_size  64m;
client_body_timeout   60s;
client_header_timeout 60s;
send_timeout          60s;

# FastCGI defaults sized for long-running CMS admin pages (import, regen,
# theme update). Override per-site if you need to tighten.
fastcgi_read_timeout  300s;
fastcgi_send_timeout  300s;
fastcgi_buffers       16 16k;
fastcgi_buffer_size   32k;
fastcgi_busy_buffers_size 64k;

# Suppress version banner — small win, makes recon noisier.
server_tokens         off;

# Sensible gzip defaults for HTML/CSS/JS/JSON.
gzip                  on;
gzip_vary             on;
gzip_proxied          any;
gzip_comp_level       5;
gzip_min_length       1024;
gzip_types            text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
