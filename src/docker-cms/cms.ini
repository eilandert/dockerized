; ---------------------------------------------------------------------------
; 90-cms.ini — globally-applied PHP-FPM defaults (loaded for ALL pools).
;
; This file is intentionally lean. Anything that should differ between the
; trusted `agent` pool and the untrusted `www` pool MUST live in the pool
; config (pool.d/www.conf, pool.d/agent.conf), NOT here — otherwise the
; per-pool override can't take effect.
;
; Notable gotcha: `disable_functions` is PHP_INI_SYSTEM and processed once
; in the FPM master, so a pool-level `php_admin_value[disable_functions] =`
; cannot RE-ENABLE functions that were disabled here. Setting it globally
; here would permanently lock the `agent` pool out of WP-CLI / proc_open
; even though that pool needs those functions. Hardening therefore lives
; in `www.conf` (per-pool disable_functions) + Snuffleupagus myguard.rules
; for the public pool only.
;
; Memory limits, exec time, opcache, sessions, uploads are all per-pool too.
; ---------------------------------------------------------------------------

; Don't leak server info in headers.
expose_php                    = Off

; Default timezone — pools can override.
date.timezone                 = Europe/Amsterdam

; Logging: log, never display, write to FPM stderr (so `docker logs` shows it).
display_errors                = Off
display_startup_errors        = Off
log_errors                    = On
error_log                     = /proc/self/fd/2

; file_uploads is a global on/off; per-pool size limits override.
file_uploads                  = On
