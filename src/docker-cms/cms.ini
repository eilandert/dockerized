; CMS-tuned PHP settings (loaded as /etc/php/8.5/fpm/conf.d/90-cms.ini).
; Override individual values via env-driven post-start script if you need
; per-deployment tuning; these are the sane CMS defaults.

memory_limit                  = 512M
max_execution_time            = 120
max_input_time                = 120
max_input_vars                = 10000

upload_max_filesize           = 64M
post_max_size                 = 64M
file_uploads                  = On
max_file_uploads              = 50

; Date / locale
date.timezone                 = Europe/Amsterdam

; Strict-ish error handling: log, don't display.
display_errors                = Off
display_startup_errors        = Off
log_errors                    = On
error_log                     = /proc/self/fd/2

; Sessions hardening — CMSes generally use these via app code, but keep
; sane defaults so plugins that fall back to PHP sessions are safe.
session.cookie_httponly       = 1
session.cookie_secure         = 1
session.cookie_samesite       = "Lax"
session.use_strict_mode       = 1
session.use_only_cookies      = 1
session.sid_length            = 48
session.sid_bits_per_character = 6

; Realpath cache — cuts stat() overhead drastically on CMS file trees.
realpath_cache_size           = 4096k
realpath_cache_ttl            = 600

; ---- OPcache ----
opcache.enable                = 1
opcache.enable_cli            = 0
opcache.memory_consumption    = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.max_wasted_percentage = 10
; Production: don't stat .php files on every request.
opcache.validate_timestamps   = 0
opcache.revalidate_freq       = 0
opcache.save_comments         = 1
opcache.fast_shutdown         = 1
opcache.jit                   = tracing
opcache.jit_buffer_size       = 128M

; ---- Don't leak server info ----
expose_php                    = Off

; ---- Disable risky/unused functions ----
; These are commonly disabled in CMS hosting (WP/Drupal don't need them);
; if a specific plugin needs one, override in a host-specific .ini.
; Shell escapes + process-control. Anything legitimate a CMS does it via
; PHP extensions (curl, ZipArchive, …), not shell. parse_ini_file and
; curl_multi_exec are deliberately *not* listed — guzzle and a number of
; well-behaved plugins use them.
disable_functions             = exec,passthru,shell_exec,system,proc_open,popen,show_source,dl,pcntl_alarm,pcntl_fork,pcntl_waitpid,pcntl_wait,pcntl_signal,pcntl_signal_dispatch,pcntl_sigprocmask,pcntl_sigwaitinfo,pcntl_sigtimedwait,pcntl_exec
