# WordPress location block — include this inside a `server { }` block:
#   include snippets/wordpress.conf;
#
# Assumes:
#   - doc root = /var/www/<site>
#   - PHP-FPM listens on unix:/run/php/php8.5-fpm.sock
#
# Drop-in for a typical CMS site under angie.

location / {
    try_files $uri $uri/ /index.php?$args;
}

# Pretty permalinks + plugin REST endpoints
location ~ \.php$ {
    include            snippets/fastcgi-php.conf;
    fastcgi_pass       unix:/run/php/php8.5-fpm.sock;
    fastcgi_param      SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param      PATH_INFO       $fastcgi_path_info;
    fastcgi_intercept_errors on;
}

# Static asset caching — be generous on max-age, CMSes append hashes.
location ~* \.(?:css|js|svg|gif|jpe?g|png|webp|avif|ico|woff2?|ttf|otf|eot)$ {
    expires            30d;
    access_log         off;
    add_header         Cache-Control "public, immutable";
    try_files          $uri =404;
}

# ---- Security: deny common attack paths ----
# Block direct access to PHP files in uploads / cache (file-upload RCE vector).
location ~* /(?:uploads|files|cache)/.*\.php$ {
    deny all;
}

# Block dotfiles, version-control, env files, backups.
location ~ /\.(?!well-known) { deny all; access_log off; log_not_found off; }
location ~* (?:wp-config\.php|configuration\.php|sites/default/settings\.php|composer\.(?:json|lock)|package(?:-lock)?\.json|\.env(?:\.[a-z0-9_-]+)?|\.git|\.svn|\.hg|\.htaccess|\.htpasswd)$ {
    deny all;
}

# Rate-limit xmlrpc + login-style endpoints (requires a shared
# `limit_req_zone $binary_remote_addr zone=cms_login:10m rate=5r/m;` in http{}).
location = /xmlrpc.php {
    limit_req zone=cms_login burst=2 nodelay;
    include   snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.5-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}
location = /wp-login.php {
    limit_req zone=cms_login burst=2 nodelay;
    include   snippets/fastcgi-php.conf;
    fastcgi_pass unix:/run/php/php8.5-fpm.sock;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}
