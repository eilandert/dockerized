# deny-hidden-files.conf — drop-in for every server{} block:
#   include snippets/deny-hidden-files.conf;
#
# Blocks the standard set of files an attacker probes for. Per-site snippets
# (wordpress.conf / drupal.conf) layer additional rules on top.

# Block all dotfiles except /.well-known (Let's Encrypt / etc.)
location ~ /\.(?!well-known) {
    deny all;
    access_log off;
    log_not_found off;
    return 404;
}

# Common credential / config file leaks
location ~* ^/(?:wp-config\.php|configuration\.php|sites/default/settings\.php|composer\.(?:json|lock)|package(?:-lock)?\.json|yarn\.lock|\.htaccess|\.htpasswd|\.user\.ini|README\.md|CHANGELOG\.md|Dockerfile|docker-compose\.ya?ml)$ {
    deny all;
    log_not_found off;
    return 404;
}

# Block source-map and backup file leaks
location ~* \.(?:bak|backup|swp|old|orig|save|tmp|log)$ {
    deny all;
    log_not_found off;
    return 404;
}

# Block direct .php access inside upload/cache dirs (RCE-via-upload vector).
location ~* /(?:uploads|files|cache|tmp|temp)/.*\.(?:php|phtml|phar|pl|py|sh)$ {
    deny all;
    return 404;
}
