# Loopback-only healthcheck vhost. Bound to 127.0.0.1 so it is never reachable
# from outside the container. The public default_server keeps returning 444.
server {
    listen 127.0.0.1:8181 default_server;
    server_name _;
    access_log off;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Real php-fpm readiness probe. fastcgi_pass to a stable socket symlink
    # (/run/php/healthz-fpm.sock -> the active pool socket, created by
    # init-bootstrap so this works for any PHP version / MULTI) and hit the
    # pool's ping.path (pm.ping => "pong"). The healthcheck curls this; a live
    # "pong" proves the master is up and the pool accepts + answers.
    location = /fpm-ping {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/healthz-fpm.sock;
        fastcgi_param SCRIPT_NAME /fpm-ping;
        fastcgi_param SCRIPT_FILENAME /fpm-ping;
    }

    location / { return 444; }
}
