# Loopback-only healthcheck vhost. Bound to 127.0.0.1 so it is never reachable
# from outside the container. The public default_server keeps returning 444.
server {
    listen 127.0.0.1:8181 default_server;
    server_name _;
    access_log off;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / { return 444; }
}
