# security-headers.conf — drop-in for every server{} block:
#   include snippets/security-headers.conf;
#
# Conservative defaults. Loosen CSP per-site as your CMS plugins demand.

# Clickjacking
add_header X-Frame-Options                   "SAMEORIGIN"                                    always;

# MIME sniffing
add_header X-Content-Type-Options            "nosniff"                                       always;

# Legacy XSS auditor — disabled deliberately (the header has known bypasses).
add_header X-XSS-Protection                  "0"                                             always;

# Referrer leak prevention
add_header Referrer-Policy                   "strict-origin-when-cross-origin"               always;

# Permissions-Policy (Feature-Policy successor). Allow only what your CMS needs.
add_header Permissions-Policy                "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;

# Cross-Origin-* — uncomment if your CMS is OK with stricter isolation
# add_header Cross-Origin-Opener-Policy      "same-origin"                                   always;
# add_header Cross-Origin-Resource-Policy    "same-site"                                     always;
# add_header Cross-Origin-Embedder-Policy    "require-corp"                                  always;

# HSTS — only enable once you're sure all traffic is on HTTPS forever. Once
# preload is in browser lists, you cannot back out for ~12 months.
add_header Strict-Transport-Security         "max-age=31536000; includeSubDomains; preload"  always;
